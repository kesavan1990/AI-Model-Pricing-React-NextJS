# Optional: runs scripts/update-pricing.mjs (Vizra API) and commits pricing.json.
# See PRICING_UPDATES.md — GitHub Actions is optional; app can use "Refresh from web" only.
name: Update pricing

on:
  schedule:
    # Daily at 14:35 UTC (avoid top-of-hour); adjust for your timezone
    - cron: '35 14 * * *'
  workflow_dispatch:
    # Allow manual run from Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and write pricing
        run: node scripts/update-pricing.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pricing.json
          if git diff --staged --quiet; then
            echo "No changes to pricing.json"
          else
            git commit -m "chore: update pricing from Vizra API [automated]"
            git push
          fi
