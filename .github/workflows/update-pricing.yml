# Fetches Vizra pricing and updates pricing.json in the repo.
# Architecture: GitHub Action → pricing.json → frontend (avoids browser rate limits).
#
# Scheduled runs execute on GitHub only (not when users open the app). Cron uses the
# repository DEFAULT branch. Enable Actions in repo Settings; forks often start with Actions off.
# Commit happens only when public/pricing.json content changes (see "Commit and push if changed").
name: Update pricing

on:
  schedule:
    # Run daily at 06:00 UTC (may be slightly delayed by GitHub load)
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: update-pricing
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch Vizra and write pricing.json
        run: node scripts/update-pricing.js

      # Commit and push only when public/pricing.json content changed (avoids empty commits)
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/pricing.json
          if git diff --staged --quiet -- public/pricing.json; then
            echo "No pricing changes"
          else
            git commit -m "chore: update pricing.json from Vizra API"
            git push
          fi
