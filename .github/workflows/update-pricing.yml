# Fetches Vizra pricing and updates pricing.json in the repo.
# Architecture: GitHub Action → pricing.json → frontend (avoids browser rate limits).
#
# Scheduled runs execute on GitHub only (not when users open the app). Cron uses the
# repository DEFAULT branch. Enable Actions in repo Settings; forks often start with Actions off.
# Commits when public/pricing.json and/or public/pricing-history.json change (see commit step).
name: Update pricing

on:
  schedule:
    # Run daily at 06:00 UTC (may be slightly delayed by GitHub load)
    - cron: '0 6 * * *'
  workflow_dispatch:

# Same group as "Update pricing history" so two workflows never push at once (avoids rejected pushes).
concurrency:
  group: pricing-data-${{ github.repository }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Pricing file + daily history snapshot in one job so history advances every run
      # even when pricing.json is unchanged (previously only workflow_run / separate cron
      # updated pricing-history.json — easy to miss if that workflow failed).
      - name: Fetch Vizra and write pricing.json
        run: node scripts/update-pricing.js

      - name: Append daily snapshot to pricing-history.json
        id: append_history
        continue-on-error: true
        run: node scripts/update-pricing-history.js

      - name: Report history-append failure
        if: steps.append_history.outcome == 'failure'
        run: |
          echo "::warning::scripts/update-pricing-history.js failed. The scheduled 'Update pricing history' workflow (IST midnight) or manual dispatch can still append. Check logs above."

      - name: Commit and push if pricing or history changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/pricing.json public/pricing-history.json
          if git diff --staged --quiet; then
            echo "No changes to pricing.json or pricing-history.json"
          else
            git commit -m "chore: update pricing and/or daily history snapshot"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin ${{ github.ref_name }}
          fi
