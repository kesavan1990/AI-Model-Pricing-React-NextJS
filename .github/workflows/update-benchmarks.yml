# Builds benchmarks.json from pricing.json (weekly). Same pattern as update-pricing.
# Architecture: Benchmark pipeline → update-benchmarks.js → benchmarks.json → frontend merges with pricing.
name: Update benchmarks

on:
  schedule:
    # Run weekly on Sunday at 03:00 UTC (Arena + HF leaderboards; benchmarks don't change daily)
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build benchmarks.json from pricing.json
        run: npm run update-benchmarks

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/benchmarks.json
          if git diff --staged --quiet -- public/benchmarks.json; then
            echo "No benchmark changes"
          else
            git commit -m "chore: update benchmarks.json"
            git push
          fi
