# Appends a daily pricing snapshot to public/pricing-history.json.
#
# Primary: `.github/workflows/update-pricing.yml` runs this script after every
# pricing fetch and commits pricing.json + pricing-history.json together.
#
# This workflow is a scheduled fallback (12:00 AM IST) and manual dispatch if
# the main pricing workflow did not run or failed before committing history.
name: Update pricing history

on:
  schedule:
    # Run daily at 12:00 AM IST (18:30 UTC)
    - cron: '30 18 * * *'
  workflow_dispatch:
  # When the main pricing workflow finishes, append history if that job skipped or failed history
  workflow_run:
    workflows: ['Update pricing']
    types:
      - completed

concurrency:
  group: pricing-data-${{ github.repository }}
  cancel-in-progress: false

jobs:
  update-history:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Append daily snapshot to pricing-history.json
        run: node scripts/update-pricing-history.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/pricing-history.json
          if git diff --staged --quiet -- public/pricing-history.json; then
            echo "No history changes"
          else
            git commit -m "chore: add daily pricing snapshot to history"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin ${{ github.ref_name }}
          fi
