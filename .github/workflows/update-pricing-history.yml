# Appends a daily pricing snapshot to public/pricing-history.json so the app's
# Pricing History has data even when no one opens the site that day.
#
# Runs after "Update pricing" completes (same day as fresh pricing.json) and keeps
# a scheduled fallback at 12:00 AM IST in case the pricing workflow was skipped.
#
# workflow_run.branches: only runs when "Update pricing" ran on this branch.
# If your default branch is not `main`, change `main` below to match (e.g. master).
name: Update pricing history

on:
  workflow_run:
    workflows: ['Update pricing']
    types: [completed]
    branches: [main]
  schedule:
    # Run daily at 12:00 AM IST (18:30 UTC)
    - cron: '30 18 * * *'
  workflow_dispatch:

concurrency:
  group: update-pricing-history
  cancel-in-progress: false

jobs:
  update-history:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Append daily snapshot to pricing-history.json
        run: node scripts/update-pricing-history.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/pricing-history.json
          if git diff --staged --quiet -- public/pricing-history.json; then
            echo "No history changes"
          else
            git commit -m "chore: add daily pricing snapshot to history"
            git push
          fi
